<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lion Reader - API Benchmarks</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 2rem;
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .subtitle { color: #94a3b8; margin-bottom: 2rem; }
    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .controls label {
      color: #94a3b8;
      font-size: 0.875rem;
    }
    .controls input[type="file"] {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.375rem;
      color: #e2e8f0;
      padding: 0.5rem;
      font-size: 0.875rem;
    }
    .controls select {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.375rem;
      color: #e2e8f0;
      padding: 0.5rem;
      font-size: 0.875rem;
    }
    .status {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.375rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      color: #94a3b8;
    }
    .status.error { border-color: #ef4444; color: #fca5a5; }
    .status.success { border-color: #22c55e; color: #86efac; }
    .charts {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    @media (min-width: 1200px) {
      .charts { grid-template-columns: 1fr 1fr; }
    }
    .chart-container {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 1.5rem;
    }
    .chart-container h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: #f1f5f9;
    }
    .chart-container canvas {
      max-height: 400px;
    }
    .summary-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 2rem;
      font-size: 0.875rem;
    }
    .summary-table th,
    .summary-table td {
      padding: 0.5rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid #334155;
    }
    .summary-table th {
      color: #94a3b8;
      font-weight: 600;
    }
    .summary-table td { color: #e2e8f0; }
    .summary-table tr:hover { background: #1e293b; }
  </style>
</head>
<body>
  <h1>Lion Reader API Benchmarks</h1>
  <p class="subtitle">Historical performance tracking across commits</p>

  <div class="controls">
    <div>
      <label for="file-input">Load local results: </label>
      <input type="file" id="file-input" accept=".json" multiple>
    </div>
    <div>
      <label for="scenario-filter">Scenario: </label>
      <select id="scenario-filter">
        <option value="all">All scenarios</option>
      </select>
    </div>
  </div>

  <div id="status" class="status">Loading results...</div>

  <div class="charts">
    <div class="chart-container">
      <h2>Latency Over Time (p50 / p95 / p99)</h2>
      <canvas id="latency-chart"></canvas>
    </div>
    <div class="chart-container">
      <h2>Requests Per Second (QPS)</h2>
      <canvas id="qps-chart"></canvas>
    </div>
    <div class="chart-container">
      <h2>Server Peak RSS (KB)</h2>
      <canvas id="memory-chart"></canvas>
    </div>
    <div class="chart-container">
      <h2>Error Count</h2>
      <canvas id="error-chart"></canvas>
    </div>
  </div>

  <h2 style="margin-top: 2rem; margin-bottom: 1rem;">Latest Run Details</h2>
  <table class="summary-table" id="summary-table">
    <thead>
      <tr>
        <th>Scenario</th>
        <th>p50 (ms)</th>
        <th>p95 (ms)</th>
        <th>p99 (ms)</th>
        <th>QPS</th>
        <th>Errors</th>
        <th>Requests</th>
      </tr>
    </thead>
    <tbody id="summary-body"></tbody>
  </table>

  <script>
    // Chart.js defaults for dark theme
    Chart.defaults.color = '#94a3b8';
    Chart.defaults.borderColor = '#334155';

    const COLORS = {
      p50: '#22c55e',
      p95: '#f59e0b',
      p99: '#ef4444',
      qps: '#3b82f6',
      rss: '#a855f7',
      errors: '#ef4444',
    };

    let allResults = [];
    let charts = {};

    // Try to load results from the gh-pages results/ directory
    async function loadRemoteResults() {
      try {
        const indexResp = await fetch('results/index.json');
        if (!indexResp.ok) throw new Error(`HTTP ${indexResp.status}`);
        const index = await indexResp.json();

        const results = await Promise.all(
          index.files.map(async (file) => {
            const resp = await fetch(`results/${file}`);
            if (!resp.ok) return null;
            return resp.json();
          })
        );

        return results.filter(Boolean);
      } catch {
        return [];
      }
    }

    // Load from file input
    function setupFileInput() {
      document.getElementById('file-input').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        for (const file of files) {
          try {
            const text = await file.text();
            const result = JSON.parse(text);
            allResults.push(result);
          } catch (err) {
            console.error(`Failed to parse ${file.name}:`, err);
          }
        }
        // Sort by date
        allResults.sort((a, b) => new Date(a.runDate).getTime() - new Date(b.runDate).getTime());
        updateDashboard();
        updateStatus(`Loaded ${allResults.length} result(s)`, 'success');
      });
    }

    function updateStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status ${type}`;
    }

    function getScenarioNames() {
      const names = new Set();
      for (const result of allResults) {
        for (const s of result.scenarios) {
          names.add(s.name);
        }
      }
      return [...names].sort();
    }

    function updateScenarioFilter() {
      const select = document.getElementById('scenario-filter');
      const current = select.value;
      const names = getScenarioNames();

      // Clear and rebuild
      select.innerHTML = '<option value="all">All scenarios</option>';
      for (const name of names) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        if (name === current) opt.selected = true;
        select.appendChild(opt);
      }

      select.addEventListener('change', () => updateDashboard());
    }

    function getLabels() {
      return allResults.map((r) => {
        const sha = r.commitSha?.substring(0, 7) || '?';
        const date = r.runDate ? new Date(r.runDate).toLocaleDateString() : '';
        return `${sha}\n${date}`;
      });
    }

    function updateDashboard() {
      const filter = document.getElementById('scenario-filter').value;
      updateScenarioFilter();

      const labels = getLabels();
      const scenarioNames = filter === 'all' ? getScenarioNames() : [filter];

      // Destroy existing charts
      for (const chart of Object.values(charts)) {
        chart.destroy();
      }
      charts = {};

      // Latency chart
      const latencyDatasets = [];
      for (const name of scenarioNames) {
        const suffix = scenarioNames.length > 1 ? ` (${name})` : '';
        latencyDatasets.push(
          {
            label: `p50${suffix}`,
            data: allResults.map((r) => r.scenarios.find((s) => s.name === name)?.latency?.p50 ?? null),
            borderColor: COLORS.p50,
            backgroundColor: COLORS.p50 + '33',
            tension: 0.3,
          },
          {
            label: `p95${suffix}`,
            data: allResults.map((r) => r.scenarios.find((s) => s.name === name)?.latency?.p95 ?? null),
            borderColor: COLORS.p95,
            backgroundColor: COLORS.p95 + '33',
            tension: 0.3,
          },
          {
            label: `p99${suffix}`,
            data: allResults.map((r) => r.scenarios.find((s) => s.name === name)?.latency?.p99 ?? null),
            borderColor: COLORS.p99,
            backgroundColor: COLORS.p99 + '33',
            tension: 0.3,
          }
        );
      }

      charts.latency = new Chart(document.getElementById('latency-chart'), {
        type: 'line',
        data: { labels, datasets: latencyDatasets },
        options: {
          responsive: true,
          plugins: { legend: { position: 'top' } },
          scales: { y: { title: { display: true, text: 'ms' }, beginAtZero: true } },
        },
      });

      // QPS chart
      const qpsDatasets = scenarioNames.map((name, i) => ({
        label: name,
        data: allResults.map((r) => r.scenarios.find((s) => s.name === name)?.qps ?? null),
        borderColor: `hsl(${(i * 360) / scenarioNames.length}, 70%, 60%)`,
        tension: 0.3,
      }));

      charts.qps = new Chart(document.getElementById('qps-chart'), {
        type: 'line',
        data: { labels, datasets: qpsDatasets },
        options: {
          responsive: true,
          plugins: { legend: { position: 'top' } },
          scales: { y: { title: { display: true, text: 'req/s' }, beginAtZero: true } },
        },
      });

      // Memory chart
      charts.memory = new Chart(document.getElementById('memory-chart'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Peak RSS',
            data: allResults.map((r) => r.peakRssKb),
            borderColor: COLORS.rss,
            backgroundColor: COLORS.rss + '33',
            tension: 0.3,
          }],
        },
        options: {
          responsive: true,
          scales: { y: { title: { display: true, text: 'KB' }, beginAtZero: true } },
        },
      });

      // Error chart
      const errorDatasets = scenarioNames.map((name, i) => ({
        label: name,
        data: allResults.map((r) => r.scenarios.find((s) => s.name === name)?.errors ?? null),
        borderColor: `hsl(${(i * 360) / scenarioNames.length}, 70%, 60%)`,
        tension: 0.3,
      }));

      charts.errors = new Chart(document.getElementById('error-chart'), {
        type: 'line',
        data: { labels, datasets: errorDatasets },
        options: {
          responsive: true,
          plugins: { legend: { position: 'top' } },
          scales: { y: { title: { display: true, text: 'errors' }, beginAtZero: true } },
        },
      });

      // Update summary table with latest run
      updateSummaryTable();
    }

    function updateSummaryTable() {
      const tbody = document.getElementById('summary-body');
      tbody.innerHTML = '';

      if (allResults.length === 0) return;

      const latest = allResults[allResults.length - 1];
      for (const s of latest.scenarios) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${s.name}</td>
          <td>${s.latency?.p50 ?? '-'}</td>
          <td>${s.latency?.p95 ?? '-'}</td>
          <td>${s.latency?.p99 ?? '-'}</td>
          <td>${s.qps ?? '-'}</td>
          <td>${s.errors ?? 0}</td>
          <td>${s.latency?.count ?? '-'}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    // Initialize
    async function init() {
      setupFileInput();

      const remoteResults = await loadRemoteResults();
      if (remoteResults.length > 0) {
        allResults = remoteResults.sort(
          (a, b) => new Date(a.runDate).getTime() - new Date(b.runDate).getTime()
        );
        updateStatus(`Loaded ${allResults.length} result(s) from history`, 'success');
        updateDashboard();
      } else {
        updateStatus(
          'No historical results found. Use the file input to load local benchmark results, ' +
          'or run benchmarks in CI to populate history.',
          ''
        );
        updateScenarioFilter();
      }
    }

    init();
  </script>
</body>
</html>
