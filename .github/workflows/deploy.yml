# Deployment workflow for Lion Reader
# Deploys to Fly.io after the CI workflow succeeds on master
#
# Prerequisites:
# 1. Create a Fly.io account and install flyctl
# 2. Run `fly launch --no-deploy` in the project directory
# 3. Create a deploy token: `fly tokens create deploy`
# 4. Add the token as a GitHub secret: FLY_API_TOKEN

name: Deploy

on:
  # Gate deploys on CI: this fires when the CI workflow finishes for a push to
  # master, and the job below only runs when CI succeeded. A direct `push`
  # trigger would race CI and deploy even if typecheck/lint/tests fail.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

# Queue deploys instead of cancelling: cancelling an in-progress `flyctl deploy`
# can kill a mid-flight canary rollout and leave a partial deployment.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    # workflow_run fires on every CI completion; only deploy when CI passed.
    # Manual dispatch bypasses the gate intentionally.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          # Deploy the exact commit CI validated (workflow_run runs on the
          # default branch's ref, which may have moved past head_sha).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        # Pass the deployed commit SHA as a RUNTIME env var (read by
        # src/server/config/env.ts for the outgoing User-Agent). A runtime var
        # reaches every process group — including the esbuild-bundled worker and
        # Discord bot, which a build-time inline never reached — and keeps the
        # Docker image build independent of the SHA, so unchanged layers stay
        # cached. Short SHA to match the previous git-derived value.
        #
        # NEXT_PUBLIC_BUILD_TIME is passed as BOTH a build arg (inlined into the
        # client bundle) and a runtime env var, using one shared value so the
        # demo's "Welcome" published time matches between the client and server
        # renders (see src/app/demo/articles/welcome-published-at.ts).
        #
        # When the Bunny storage config is present (BUNNY_STORAGE_ZONE_NAME
        # repo variable + BUNNY_STORAGE_ZONE_PASSWORD secret), the deploy
        # splits into build → extract /_next/static from the built image →
        # upload to the storage zone → release. Ordering matters: every hashed
        # asset must be in the storage zone BEFORE any HTML referencing it goes
        # live, so the /_next/static edge rule (issue #1318) never serves a 404
        # for the current build. Uploads are additive, so previous builds'
        # assets stay servable after the deploy deletes them from the origin —
        # the deploy-skew fix of issue #1350. Without the config this falls
        # back to the original single-step deploy.
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          if [ -n "$BUNNY_STORAGE_ZONE_NAME" ] && [ -n "$BUNNY_STORAGE_ZONE_PASSWORD" ]; then
            IMAGE="registry.fly.io/lion-reader:deploy-${SHORT_SHA}"
            flyctl deploy --remote-only --build-only --push \
              --image-label "deploy-${SHORT_SHA}" \
              --build-arg NEXT_PUBLIC_BUILD_TIME="$BUILD_TIME"
            flyctl auth docker
            docker pull "$IMAGE"
            CID="$(docker create "$IMAGE")"
            docker cp "$CID":/app/.next/static ./next-static
            docker rm "$CID"
            bash scripts/upload-bunny-static.sh ./next-static
            flyctl deploy --image "$IMAGE" \
              --env NEXT_PUBLIC_BUILD_TIME="$BUILD_TIME" \
              --env GIT_COMMIT_SHA="$SHORT_SHA"
          else
            echo "Bunny storage config not set; single-step deploy (static assets served from origin only)"
            flyctl deploy --remote-only \
              --build-arg NEXT_PUBLIC_BUILD_TIME="$BUILD_TIME" \
              --env NEXT_PUBLIC_BUILD_TIME="$BUILD_TIME" \
              --env GIT_COMMIT_SHA="$SHORT_SHA"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          # Zone name and endpoint aren't sensitive, so they're repository
          # VARIABLES (Settings > Secrets and variables > Actions > Variables);
          # only the zone password is a secret.
          BUNNY_STORAGE_ZONE_NAME: ${{ vars.BUNNY_STORAGE_ZONE_NAME }}
          BUNNY_STORAGE_ZONE_PASSWORD: ${{ secrets.BUNNY_STORAGE_ZONE_PASSWORD }}
          # The lionreader storage zone's primary region is Los Angeles; the
          # script's storage.bunnycdn.com default only works for Falkenstein
          # zones (anything else 401s). Set the BUNNY_STORAGE_ENDPOINT variable
          # only if the zone's region changes.
          BUNNY_STORAGE_ENDPOINT: ${{ vars.BUNNY_STORAGE_ENDPOINT || 'https://la.storage.bunnycdn.com' }}

      - name: Purge CDN cache
        # Every deploy deletes the previous build's hashed /_next/static assets
        # from the origin, so any HTML the CDN cached before the deploy
        # references chunks the origin now 404s — hydration fails and visitors
        # get the global-error page (issue #1350). Purging the Bunny pull zone
        # right after the rollout makes the CDN refetch fresh HTML immediately;
        # the storage-zone upload above keeps old builds' assets servable for
        # any stragglers.
        #
        # Requires (skips gracefully when either is missing):
        #   BUNNY_API_KEY      secret   - account API key (Account Settings > API)
        #   BUNNY_PULL_ZONE_ID variable - numeric id of the lionreader pull zone
        run: |
          if [ -z "$BUNNY_API_KEY" ] || [ -z "$BUNNY_PULL_ZONE_ID" ]; then
            echo "Bunny purge config not set; skipping CDN purge"
            exit 0
          fi
          # Best-effort: a failed purge must not mark a successful deploy red —
          # the storage-zone upload keeps stale HTML's assets servable anyway.
          # The warning still surfaces a broken key in the run summary.
          if curl -sf -X POST \
            "https://api.bunny.net/pullzone/${BUNNY_PULL_ZONE_ID}/purgeCache" \
            -H "AccessKey: ${BUNNY_API_KEY}"; then
            echo "CDN cache purged"
          else
            echo "::warning::Bunny CDN purge failed (deploy itself succeeded); check BUNNY_API_KEY / BUNNY_PULL_ZONE_ID"
          fi
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_PULL_ZONE_ID: ${{ vars.BUNNY_PULL_ZONE_ID }}
