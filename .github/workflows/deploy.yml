# Deployment workflow for Lion Reader
# Deploys to Fly.io after the CI workflow succeeds on master
#
# Prerequisites:
# 1. Create a Fly.io account and install flyctl
# 2. Run `fly launch --no-deploy` in the project directory
# 3. Create a deploy token: `fly tokens create deploy`
# 4. Add the token as a GitHub secret: FLY_API_TOKEN

name: Deploy

on:
  # Gate deploys on CI: this fires when the CI workflow finishes for a push to
  # master, and the job below only runs when CI succeeded. A direct `push`
  # trigger would race CI and deploy even if typecheck/lint/tests fail.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

# Queue deploys instead of cancelling: cancelling an in-progress `flyctl deploy`
# can kill a mid-flight canary rollout and leave a partial deployment.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    # workflow_run fires on every CI completion; only deploy when CI passed.
    # Manual dispatch bypasses the gate intentionally.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          # Deploy the exact commit CI validated (workflow_run runs on the
          # default branch's ref, which may have moved past head_sha).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        # GIT_COMMIT_SHA (read by src/server/config/env.ts for the outgoing
        # User-Agent) and BUILD_TIME are passed as BUILD ARGS. The Dockerfile
        # stamps them into a real ENV in the final runner layer, AFTER every
        # COPY, so the value is baked into the image (robust versioning that
        # survives without a per-deploy runtime --env) while only busting that
        # trivial final layer — earlier layers stay cached. Being real runtime
        # env vars, they reach every process group (app / worker / Discord),
        # including the esbuild-bundled ones a build-time inline never reached.
        # Short SHA to match the previous git-derived value.
        #
        # NEXT_PUBLIC_BUILD_TIME is separate: it must be a build arg because
        # Next inlines NEXT_PUBLIC_* into the client bundle at build time. It's
        # also passed as a runtime env var, using the SAME timestamp as
        # BUILD_TIME, so the demo's "Welcome" published time matches between the
        # client and server renders (see
        # src/app/(public)/demo/articles/welcome-published-at.ts).
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          flyctl deploy --remote-only \
            --build-arg GIT_COMMIT_SHA="$SHORT_SHA" \
            --build-arg BUILD_TIME="$BUILD_TIME" \
            --build-arg NEXT_PUBLIC_BUILD_TIME="$BUILD_TIME" \
            --env NEXT_PUBLIC_BUILD_TIME="$BUILD_TIME"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
