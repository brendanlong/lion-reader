name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Check for raw color utilities
        run: pnpm check:colors

      - name: Check for dead theme-token utilities
        run: pnpm check:theme-tokens

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native modules
        run: pnpm build:native

      - name: Run unit tests
        run: pnpm test:unit

  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Build release extension
        run: bash extension/build.sh --release

      - name: Upload Chrome extension
        uses: actions/upload-artifact@v7
        with:
          name: lion-reader-chrome
          path: extension/lion-reader-chrome.zip

      - name: Upload Firefox extension
        uses: actions/upload-artifact@v7
        with:
          name: lion-reader-firefox
          path: extension/lion-reader-firefox.zip

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Service credentials mirror docker-compose.yml / .env.test so the job can
    # run `pnpm test:integration` exactly as developers do locally (migrations,
    # schema dump, and env all come from .env.test).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lionreader_test
          POSTGRES_USER: lionreader
          POSTGRES_PASSWORD: lionreader
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native modules
        run: pnpm build:native

      - name: Run integration tests
        run: pnpm test:integration

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lionreader_test
          POSTGRES_USER: lionreader
          POSTGRES_PASSWORD: lionreader
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native modules
        run: pnpm build:native

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Build the production server so e2e exercises the deployed code path
      # (next build + node dist/server.js with the compression wrapper), not
      # the dev server. playwright.config.ts switches to `pnpm start` when CI
      # is set. The database URLs are only validated at build time, not used.
      - name: Build production server
        run: pnpm build && pnpm build:server
        env:
          DATABASE_URL: postgresql://lionreader:lionreader@localhost:5432/lionreader_test
          REDIS_URL: redis://localhost:6379

      - name: Run e2e tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
