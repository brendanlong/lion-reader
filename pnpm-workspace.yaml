packages:
  - .

# Supply-chain: don't install a package version until it has been on the registry
# for this many minutes (10080 = 7 days), so a compromised release has time to be
# caught and yanked before it reaches us. Codified here (rather than left to each
# machine's global pnpm config) so every contributor and CI resolves identically.
# A frozen-lockfile install skips resolution, so this only gates adding/updating deps.
#
# Note: high-usage, high-frequency packages are the *most* attractive supply-chain
# targets, so we deliberately do NOT exempt any package from the cooldown (no
# minimumReleaseAgeExclude). If a churny transitive dep (e.g. browserslist /
# caniuse-lite) lands a release inside the window and blocks `pnpm add`/install,
# nudge the lockfile back to a cooldown-cleared version — don't exclude it:
#   1. temporarily add `<pkg>: <older-version>` under `overrides:` below
#   2. run `pnpm install --config.minimumReleaseAge=0` once to rewrite the lockfile
#   3. remove the override again — pnpm keeps the now-locked mature version and
#      won't re-upgrade it, so future `pnpm update` can move forward once newer
#      releases have themselves cleared the window (nothing stays pinned forever).
minimumReleaseAge: 10080

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

onlyBuiltDependencies:
  - "@sentry/cli"
  - argon2
  - esbuild
  - protobufjs

overrides:
  trpc-to-openapi>h3: ^1.15.9
  serialize-javascript: ^7.0.5
  "@modelcontextprotocol/sdk>hono": ^4.12.21
  express-rate-limit>ip-address: ^10.1.1
  "@discordjs/ws>ws": ^8.20.1
  knip>smol-toml: ^1.6.1
  qs: ^6.15.2
  postcss: ^8.5.10
  fast-xml-parser: ^5.8.0
