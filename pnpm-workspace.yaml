packages:
  - .
  # Native (Rust) modules - loader + typings; the .node binaries are built by
  # `pnpm build:native` (cargo), not by pnpm.
  - native/sanitizer
  - native/readability

# Supply-chain: only resolve package versions that have been on the registry for at
# least this many minutes (10080 = 7 days), giving a compromised release time to be
# caught and yanked before it reaches us. pnpm skips in-window versions and picks the
# newest one that has cleared the cooldown, so `pnpm add`/`update` need no special
# handling. Set here (not per-machine global config) so everyone resolves identically.
# We deliberately keep this applied to every package — high-usage, high-frequency
# deps are the most attractive targets, so there's no minimumReleaseAgeExclude.
minimumReleaseAge: 10080

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

onlyBuiltDependencies:
  - "@sentry/cli"
  - argon2
  - esbuild
  - protobufjs

overrides:
  trpc-to-openapi>h3: ^1.15.9
  serialize-javascript: ^7.0.5
  "@modelcontextprotocol/sdk>hono": ^4.12.21
  express-rate-limit>ip-address: ^10.1.1
  "@discordjs/ws>ws": ^8.20.1
  knip>smol-toml: ^1.6.1
  qs: ^6.15.2
  postcss: ^8.5.10
  fast-xml-parser: ^5.8.0
