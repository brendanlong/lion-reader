packages:
  - .

# Supply-chain: don't install a package version until it has been on the registry
# for this many minutes (10080 = 7 days), so a compromised release has time to be
# caught and yanked before it reaches us. Codified here (rather than left to each
# machine's global pnpm config) so every contributor and CI resolves identically.
# A frozen-lockfile install skips resolution, so this only gates adding/updating deps.
#
# Note: high-usage, high-frequency packages are the *most* attractive supply-chain
# targets, so we deliberately do NOT exempt any package from the cooldown. When a
# churny transitive dep (browserslist/caniuse-lite) lands a release inside the
# window and blocks `pnpm add`, pin it a notch back via `overrides` below to the
# newest version that has cleared the cooldown — never exclude it.
minimumReleaseAge: 10080

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

onlyBuiltDependencies:
  - "@sentry/cli"
  - argon2
  - esbuild
  - protobufjs

overrides:
  # Pinned a notch back so the lockfile stays inside the minimumReleaseAge cooldown
  # above (their latest releases land inside the 7-day window and would otherwise
  # block `pnpm add`). Bump these to the newest cooldown-cleared version when
  # convenient — they're just browser-target data, so being a few days behind is fine.
  browserslist: 4.28.5
  caniuse-lite: 1.0.30001803
  trpc-to-openapi>h3: ^1.15.9
  serialize-javascript: ^7.0.5
  "@modelcontextprotocol/sdk>hono": ^4.12.21
  express-rate-limit>ip-address: ^10.1.1
  "@discordjs/ws>ws": ^8.20.1
  knip>smol-toml: ^1.6.1
  qs: ^6.15.2
  postcss: ^8.5.10
  fast-xml-parser: ^5.8.0
