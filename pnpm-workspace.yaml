packages:
  - .

# Supply-chain: don't install a package version until it has been on the registry
# for this many minutes (10080 = 7 days), so a compromised release has time to be
# caught and yanked before it reaches us. Codified here (rather than left to each
# machine's global pnpm config) so every contributor and CI resolves identically.
# A frozen-lockfile install skips resolution, so this only gates adding/updating deps.
minimumReleaseAge: 10080

# Exempt high-churn browser-data packages from the cooldown. They publish multiple
# times a week (caniuse data), so a fresh release routinely lands inside the 7-day
# window and blocks otherwise-unrelated `pnpm add`/update runs. They're ubiquitous,
# low-risk data packages, so the cooldown buys little here.
minimumReleaseAgeExclude:
  - browserslist
  - caniuse-lite

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

onlyBuiltDependencies:
  - "@sentry/cli"
  - argon2
  - esbuild
  - protobufjs

overrides:
  trpc-to-openapi>h3: ^1.15.9
  serialize-javascript: ^7.0.5
  "@modelcontextprotocol/sdk>hono": ^4.12.21
  express-rate-limit>ip-address: ^10.1.1
  "@discordjs/ws>ws": ^8.20.1
  knip>smol-toml: ^1.6.1
  qs: ^6.15.2
  postcss: ^8.5.10
  fast-xml-parser: ^5.8.0
